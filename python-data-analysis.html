<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python 数据分析 - 交互式学习平台</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>

    darkMode: 'class',
    theme: {
        extend: {
            fontFamily: {

            }
        }
    }
}

<style>
/* ===== Base Styles ===== */
:root {
    --bg-primary: #1e1e2e;
    --bg-secondary: #181825;
    --bg-tertiary: #313244;
    --bg-card: #252536;
    --text-primary: #cdd6f4;
    --text-secondary: #a6adc8;
    --text-muted: #6c7086;
    --accent: #89b4fa;
    --accent-hover: #74c7ec;
    --green: #a6e3a1;
    --red: #f38ba8;
    --yellow: #f9e2af;
    --peach: #fab387;
    --border: #45475a;
    --sidebar-width: 300px;
}

.light-theme {
    --bg-primary: #eff1f5;
    --bg-secondary: #e6e9ef;
    --bg-tertiary: #ccd0da;
    --bg-card: #ffffff;
    --text-primary: #4c4f69;
    --text-secondary: #5c5f77;
    --text-muted: #8c8fa1;
    --accent: #1e66f5;
    --accent-hover: #2a6ef5;
    --green: #40a02b;
    --red: #d20f39;
    --yellow: #df8e1d;
    --peach: #fe640b;
    --border: #bcc0cc;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ===== Layout ===== */
.app-container {
    display: flex;
    min-height: 100vh;
}

/* ===== Sidebar ===== */
.sidebar {
    width: var(--sidebar-width);
    min-width: var(--sidebar-width);
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    z-index: 40;
    transition: transform 0.3s;
}

.sidebar.collapsed {
    transform: translateX(-100%);
}

.sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
}

.sidebar-header i {
    color: var(--accent);
    font-size: 1.3rem;
}

.sidebar-header h1 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text-primary);
}

.sidebar-search {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
}

.sidebar-search input {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-primary);
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
}

.sidebar-search input:focus {
    border-color: var(--accent);
}

.sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
}

.nav-section {
    margin-bottom: 4px;
}

.nav-section-title {
    padding: 8px 16px;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
}

.nav-section-title:hover {
    color: var(--text-secondary);
}

.nav-section-title i {
    font-size: 0.6rem;
    transition: transform 0.2s;
}

.nav-section.collapsed .nav-section-title i {
    transform: rotate(-90deg);
}

.nav-section.collapsed .nav-items {
    display: none;
}

.nav-item {
    padding: 6px 16px 6px 28px;
    font-size: 0.82rem;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
    user-select: none;
}

.nav-item:hover {
    background: var(--bg-tertiary);
    color: var(--text-primary);
}

.nav-item.active {
    background: var(--bg-tertiary);
    color: var(--accent);
    border-right: 3px solid var(--accent);
}

.nav-item .check-icon {
    width: 16px;
    height: 16px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    flex-shrink: 0;
    transition: all 0.2s;
}

.nav-item .check-icon.checked {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
}

.nav-item .nav-label {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

/* ===== Main Content ===== */
.main-content {
    flex: 1;
    margin-left: var(--sidebar-width);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    transition: margin-left 0.3s;
}

.main-content.expanded {
    margin-left: 0;
}

/* ===== Top Bar ===== */
.top-bar {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 30;
}

.toggle-sidebar-btn {
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 1.1rem;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: all 0.15s;
}

.toggle-sidebar-btn:hover {
    background: var(--bg-tertiary);
    color: var(--text-primary);
}

.progress-container {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
}

.progress-bar-bg {
    flex: 1;
    height: 6px;
    background: var(--bg-tertiary);
    border-radius: 3px;
    overflow: hidden;
}

.progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 3px;
    transition: width 0.5s ease;
}

.progress-text {
    font-size: 0.78rem;
    color: var(--text-muted);
    white-space: nowrap;
}

.theme-toggle {
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 1.1rem;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: all 0.15s;
}

.theme-toggle:hover {
    background: var(--bg-tertiary);
    color: var(--text-primary);
}

/* ===== Content Area ===== */
.content-area {
    flex: 1;
    padding: 24px;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
}

/* ===== Welcome Page ===== */
.welcome-page {
    text-align: center;
    padding: 60px 20px;
}

.welcome-page h2 {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--text-primary);
}

.welcome-page p {
    color: var(--text-secondary);
    font-size: 1rem;
    margin-bottom: 30px;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
}

.welcome-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 16px;
    margin-top: 30px;
}

.welcome-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
}

.welcome-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
}

.welcome-card i {
    font-size: 1.5rem;
    color: var(--accent);
    margin-bottom: 10px;
}

.welcome-card h3 {
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 6px;
}

.welcome-card p {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin: 0;
}

/* ===== Section Pages ===== */
.section-page {
    display: none;
}

.section-page.active {
    display: block;
}

.section-title {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text-primary);
}

.section-desc {
    color: var(--text-secondary);
    font-size: 0.9rem;
    margin-bottom: 20px;
    line-height: 1.6;
}

.section-content {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
    line-height: 1.8;
    font-size: 0.9rem;
}

.section-content h3 {
    font-size: 1.1rem;
    font-weight: 600;
    margin: 16px 0 8px;
    color: var(--accent);
}

.section-content h4 {
    font-size: 0.95rem;
    font-weight: 600;
    margin: 12px 0 6px;
    color: var(--peach);
}

.section-content p {
    margin-bottom: 8px;
}

.section-content ul, .section-content ol {
    padding-left: 20px;
    margin-bottom: 8px;
}

.section-content li {
    margin-bottom: 4px;
}

.section-content code {
    background: var(--bg-tertiary);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
}

.section-content pre {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    overflow-x: auto;
    margin: 10px 0;
}

.section-content pre code {
    background: none;
    padding: 0;
    font-size: 0.82rem;
}

/* ===== Project Page ===== */
.project-header {
    margin-bottom: 20px;
}

.project-header h2 {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 6px;
}

.project-header .project-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
}

.project-tag {
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 12px;
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    border: 1px solid var(--border);
}

.project-tag.data-file {
    background: rgba(137, 180, 250, 0.15);
    color: var(--accent);
    border-color: rgba(137, 180, 250, 0.3);
}

/* ===== Tab System ===== */
.tab-container {
    margin-bottom: 20px;
}

.tab-buttons {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--border);
    margin-bottom: 0;
}

.tab-btn {
    padding: 10px 20px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
    font-family: 'Noto Sans SC', sans-serif;
}

.tab-btn:hover {
    color: var(--text-secondary);
}

.tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
}

.tab-panel {
    display: none;
}

.tab-panel.active {
    display: block;
}

/* ===== Code Editor ===== */
.editor-container {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 12px;
}

.editor-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
}

.editor-toolbar .toolbar-left {
    display: flex;
    align-items: center;
    gap: 8px;
}

.editor-toolbar .toolbar-left i {
    color: var(--accent);
}

.editor-toolbar .toolbar-left span {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-secondary);
}

.editor-toolbar .toolbar-right {
    display: flex;
    gap: 6px;
}

.btn {
    padding: 6px 14px;
    border: none;
    border-radius: 5px;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.15s;
    font-family: 'Noto Sans SC', sans-serif;
}

.btn-primary {
    background: var(--accent);
    color: #fff;
}

.btn-primary:hover {
    background: var(--accent-hover);
}

.btn-secondary {
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    border: 1px solid var(--border);
}

.btn-secondary:hover {
    background: var(--border);
    color: var(--text-primary);
}

.btn-success {
    background: var(--green);
    color: #1e1e2e;
}

.btn-warning {
    background: var(--yellow);
    color: #1e1e2e;
}

.btn-danger {
    background: var(--red);
    color: #fff;
}

.btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* CodeMirror overrides */
.editor-container .CodeMirror {
    height: 350px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
}

.light-theme .editor-container .CodeMirror {
    background: #fafafa;
}

/* ===== Output Area ===== */
.output-container {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 16px;
}

.output-header {
    padding: 8px 12px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.output-header span {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
}

.output-body {
    padding: 12px;
    background: var(--bg-secondary);
    min-height: 60px;
    max-height: 500px;
    overflow-y: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text-primary);
}

.output-body .output-text {
    margin-bottom: 8px;
}

.output-body .output-image {
    max-width: 100%;
    border-radius: 6px;
    margin: 8px 0;
    border: 1px solid var(--border);
}

.output-body .output-error {
    color: var(--red);
}

/* ===== Exercise (Fill-in-the-blank) ===== */
.exercise-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
}

.exercise-card h4 {
    font-size: 0.92rem;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--peach);
}

.exercise-card .exercise-desc {
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-bottom: 10px;
    line-height: 1.6;
}

.exercise-code {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    margin-bottom: 10px;
    white-space: pre-wrap;
    line-height: 1.6;
}

.exercise-code .blank-input {
    display: inline-block;
    min-width: 120px;
    padding: 2px 8px;
    background: var(--bg-tertiary);
    border: 1px dashed var(--accent);
    border-radius: 3px;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s;
}

.exercise-code .blank-input:focus {
    border-color: var(--green);
    border-style: solid;
}

.exercise-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.exercise-result {
    margin-top: 8px;
    padding: 8px 12px;
    border-radius: 5px;
    font-size: 0.82rem;
    display: none;
}

.exercise-result.correct {
    display: block;
    background: rgba(166, 227, 161, 0.15);
    border: 1px solid rgba(166, 227, 161, 0.3);
    color: var(--green);
}

.exercise-result.wrong {
    display: block;
    background: rgba(243, 139, 168, 0.15);
    border: 1px solid rgba(243, 139, 168, 0.3);
    color: var(--red);
}

.exercise-result.hint {
    display: block;
    background: rgba(249, 226, 175, 0.15);
    border: 1px solid rgba(249, 226, 175, 0.3);
    color: var(--yellow);
}

.exercise-result.answer {
    display: block;
    background: rgba(137, 180, 250, 0.15);
    border: 1px solid rgba(137, 180, 250, 0.3);
    color: var(--accent);
}

/* ===== Data Preview Modal ===== */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 50;
    align-items: center;
    justify-content: center;
}

.modal-overlay.active {
    display: flex;
}

.modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 90%;
    max-width: 900px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
}

.modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.modal-header h3 {
    font-size: 1rem;
    font-weight: 600;
}

.modal-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 4px;
}

.modal-close:hover {
    color: var(--text-primary);
}

.modal-body {
    flex: 1;
    overflow: auto;
    padding: 16px 20px;
}

.data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
}

.data-table th {
    background: var(--bg-tertiary);
    padding: 8px 10px;
    text-align: left;
    font-weight: 600;
    color: var(--text-secondary);
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
}

.data-table td {
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
    white-space: nowrap;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
}

.data-table tr:hover td {
    background: var(--bg-tertiary);
}

/* ===== Loading Overlay ===== */
.loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--bg-primary);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.5s;
}

.loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
}

.loading-spinner {
    width: 50px;
    height: 50px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 20px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.loading-text {
    font-size: 1rem;
    color: var(--text-secondary);
    margin-bottom: 8px;
}

.loading-progress {
    width: 300px;
    height: 4px;
    background: var(--bg-tertiary);
    border-radius: 2px;
    overflow: hidden;
}

.loading-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s;
}

/* ===== Data Upload Section ===== */
.upload-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
}

.upload-section h3 {
    font-size: 0.92rem;
    font-weight: 600;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.upload-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
}

.upload-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.78rem;
}

.upload-item .file-info {
    display: flex;
    align-items: center;
    gap: 6px;
}

.upload-item .file-info i {
    color: var(--accent);
}

.upload-item .file-info span {
    color: var(--text-secondary);
}

.upload-item .preview-btn {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 0.78rem;
    padding: 2px 6px;
    border-radius: 3px;
}

.upload-item .preview-btn:hover {
    background: var(--bg-tertiary);
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
    .sidebar {
        transform: translateX(-100%);
    }
    .sidebar.mobile-open {
        transform: translateX(0);
    }
    .main-content {
        margin-left: 0;
    }
    .content-area {
        padding: 16px;
    }
    .editor-container .CodeMirror {
        height: 250px;
    }
}

/* ===== Pyodide status indicator ===== */
.pyodide-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    color: var(--text-muted);
}

.pyodide-status .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
}

.pyodide-status .status-dot.ready {
    background: var(--green);
}

.pyodide-status .status-dot.loading {
    background: var(--yellow);
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}

<h3>核心概念</h3>
<p>描述性统计通过<strong>集中趋势</strong>、<strong>离散程度</strong>和<strong>分布形态</strong>三个维度来刻画数据。</p>

<h4>集中趋势度量</h4>
<ul>
<li><strong>均值 (Mean)</strong>：所有值的算术平均，对异常值敏感</li>
<li><strong>中位数 (Median)</strong>：排序后中间的值，抗异常值</li>
<li><strong>众数 (Mode)</strong>：出现频率最高的值</li>
</ul>

<h4>离散程度度量</h4>
<ul>
<li><strong>标准差 (Std)</strong>：衡量数据的波动程度</li>
<li><strong>方差 (Variance)</strong>：标准差的平方</li>
<li><strong>四分位距 (IQR)</strong>：Q3 - Q1，抗异常值</li>
<li><strong>极差 (Range)</strong>：最大值 - 最小值</li>
</ul>

<h4>分布形态</h4>
<ul>
<li><strong>偏度 (Skewness)</strong>：衡量分布的不对称性，&gt;0右偏，&lt;0左偏</li>
<li><strong>峰度 (Kurtosis)</strong>：衡量分布的尖峰程度</li>
</ul>

<h3>Python 实战</h3>
<pre><code class="language-python">import pandas as pd
import numpy as np

df = pd.read_csv("user_behavior.csv")

# 集中趋势
print("均值:", df["消费金额"].mean())
print("中位数:", df["消费金额"].median())

# 离散程度
print("标准差:", df["消费金额"].std())
print("IQR:", df["消费金额"].quantile(0.75) - df["消费金额"].quantile(0.25))

# 分布形态
print("偏度:", df["消费金额"].skew())
print("峰度:", df["消费金额"].kurtosis())

# 一键描述统计
print(df[["消费金额", "消费频次", "浏览时长"]].describe())</code></pre>

<h4>相关系数类型</h4>

<h4>相关 vs 因果的经典陷阱</h4>

<h3>核心概念</h3>

<h4>关键术语</h4>
<ul>

<li><strong>统计功效 (1-&beta;)</strong>：正确拒绝H0的概率</li>
</ul>

<h4>常用检验方法</h4>
<ul>
<li><strong>t检验</strong>：比较两组均值差异</li>
<li><strong>卡方检验</strong>：检验分类变量的独立性</li>
<li><strong>ANOVA</strong>：比较多组均值差异</li>
<li><strong>Shapiro-Wilk</strong>：正态性检验</li>
</ul>

<h3>Python 实战</h3>
<pre><code class="language-python">from scipy import stats

print(f"Shapiro-Wilk: stat={stat:.4f}, p={p:.4f}")

# 两组均值比较（男 vs 女消费金额）
male = df[df["性别"]=="男"]["消费金额"].dropna()
female = df[df["性别"]=="女"]["消费金额"].dropna()
stat, p = stats.ttest_ind(male, female)
print(f"t检验: stat={stat:.4f}, p={p:.4f}")
if p < 0.05:
    print("男女消费金额存在显著差异")
else:
    print("男女消费金额无显著差异")</code></pre>

<h4>支持"p值已死"的观点</h4>
<ul>
<li>p值只告诉你"在H0下这个结果有多极端"，不告诉你效应量有多大</li>

<li><strong>格式不统一</strong>：日期格式混乱、大小写不一致</li>
<li><strong>量纲差异</strong>：消费金额（万元级）vs 浏览时长（分钟级）</li>
</ul>

<h3>📖 二、缺失值处理策略</h3>
<table class="data-table" style="width:100%;margin:10px 0;border-collapse:collapse;">
<tr style="background:var(--bg-tertiary)"><th style="padding:8px;text-align:left;border:1px solid var(--border)">方法</th><th style="padding:8px;text-align:left;border:1px solid var(--border)">适用场景</th><th style="padding:8px;text-align:left;border:1px solid var(--border)">代码</th></tr>
<tr><td style="padding:8px;border:1px solid var(--border)"><strong>均值填充</strong></td><td style="padding:8px;border:1px solid var(--border)">数据正态分布、无异常值</td><td style="padding:8px;border:1px solid var(--border)"><code>df["列"].fillna(df["列"].mean())</code></td></tr>
<tr><td style="padding:8px;border:1px solid var(--border)"><strong>中位数填充</strong> ⭐</td><td style="padding:8px;border:1px solid var(--border)">有异常值时首选</td><td style="padding:8px;border:1px solid var(--border)"><code>df["列"].fillna(df["列"].median())</code></td></tr>
<tr><td style="padding:8px;border:1px solid var(--border)"><strong>众数填充</strong></td><td style="padding:8px;border:1px solid var(--border)">分类变量（性别、地区）</td><td style="padding:8px;border:1px solid var(--border)"><code>df["列"].fillna(df["列"].mode()[0])</code></td></tr>
<tr><td style="padding:8px;border:1px solid var(--border)"><strong>固定值填充</strong></td><td style="padding:8px;border:1px solid var(--border)">明确默认值时</td><td style="padding:8px;border:1px solid var(--border)"><code>df["列"].fillna("未知")</code></td></tr>
<tr><td style="padding:8px;border:1px solid var(--border)"><strong>删除</strong></td><td style="padding:8px;border:1px solid var(--border)">缺失比例高或该行不重要</td><td style="padding:8px;border:1px solid var(--border)"><code>df.dropna(subset=["列"])</code></td></tr>
</table>
<div style="background:var(--bg-tertiary);padding:12px;border-radius:8px;margin:10px 0;border-left:4px solid var(--yellow)">
<strong>⚠️ 新手常犯错误</strong>：对含异常值的字段用<strong>均值</strong>填充！异常值会拉高均值，导致填充值失真。<br>
<strong>正确做法</strong>：用<strong>中位数</strong>填充，中位数不受极端值影响。
</div>

<h3>📖 三、异常值检测</h3>
<p>两种常用方法：</p>
<p><strong>方法1：3σ原则</strong>（数据服从正态分布时）</p>
<pre><code class="language-python">mean = df["消费金额"].mean()
std = df["消费金额"].std()
upper = mean + 3 * std   # 上界
lower = mean - 3 * std   # 下界
outliers = df[(df["消费金额"] > upper) | (df["消费金额"] < lower)]
print(f"异常值数量: {len(outliers)}")</code></pre>
<p><strong>方法2：箱线图 IQR</strong>（不要求正态分布）</p>
<pre><code class="language-python">Q1 = df["消费金额"].quantile(0.25)
Q3 = df["消费金额"].quantile(0.75)
IQR = Q3 - Q1
upper = Q3 + 1.5 * IQR
lower = Q1 - 1.5 * IQR
outliers = df[(df["消费金额"] > upper) | (df["消费金额"] < lower)]</code></pre>

<h3>📖 四、特征工程</h3>
<pre><code class="language-python"># 1. 分桶（连续→离散）
df["消费等级"] = pd.cut(df["消费金额"], bins=[0, 100, 500, 1000, float('inf')],
                       labels=["低", "中", "高", "超高"])

# 2. 离散化

# 3. 类别编码
from sklearn.preprocessing import LabelEncoder

<div style="background:var(--bg-tertiary);padding:12px;border-radius:8px;margin:10px 0;border-left:4px solid var(--red)">

        content: `
<h3>📖 一、什么是关联规则？</h3>
<p>关联规则挖掘的目标是发现<strong>"如果买了A，很可能也会买B"</strong>的模式。经典案例：超市发现"啤酒和尿布"经常被一起购买。</p>

<h3>📖 二、三大核心指标</h3>
<table class="data-table" style="width:100%;margin:10px 0;border-collapse:collapse;">
<tr style="background:var(--bg-tertiary)"><th style="padding:8px;text-align:left;border:1px solid var(--border)">指标</th><th style="padding:8px;text-align:left;border:1px solid var(--border)">公式</th><th style="padding:8px;text-align:left;border:1px solid var(--border)">含义</th><th style="padding:8px;text-align:left;border:1px solid var(--border)">阈值建议</th></tr>
<tr><td style="padding:8px;border:1px solid var(--border)"><strong>支持度</strong></td><td style="padding:8px;border:1px solid var(--border)">P(A∩B)</td><td style="padding:8px;border:1px solid var(--border)">A和B同时出现的概率</td><td style="padding:8px;border:1px solid var(--border)">≥ 0.05</td></tr>
<tr><td style="padding:8px;border:1px solid var(--border)"><strong>置信度</strong></td><td style="padding:8px;border:1px solid var(--border)">P(B|A)</td><td style="padding:8px;border:1px solid var(--border)">买A后买B的概率</td><td style="padding:8px;border:1px solid var(--border)">≥ 0.7</td></tr>
<tr><td style="padding:8px;border:1px solid var(--border)"><strong>提升度</strong></td><td style="padding:8px;border:1px solid var(--border)">置信度/P(B)</td><td style="padding:8px;border:1px solid var(--border)">A是否真正促进了B</td><td style="padding:8px;border:1px solid var(--border)"><strong>&gt; 1</strong> 才有效</td></tr>

<strong>💡 关键理解</strong>：提升度 &gt; 1 表示 A 确实促进了 B 的购买；提升度 ≤ 1 说明 A 和 B 只是碰巧一起出现，没有实际关联价值。
</div>

<h3>📖 三、Apriori算法步骤</h3>
<pre><code class="language-python">from mlxtend.frequent_patterns import apriori, association_rules
import pandas as pd

# Step 1: 读取购物车数据
df = pd.read_csv("cart_data.csv")

# Step 2: 转换为 one-hot 编码（每行=一个订单，每列=一个商品）
cart_encoded = pd.get_dummies(df["商品名称"], prefix="商品")

# Step 3: 按订单合并（一个订单可能有多行）
basket = cart_encoded.groupby(df["订单ID"]).max()

# Step 4: 挖掘频繁项集
frequent_itemsets = apriori(basket, min_support=0.05, use_colnames=True)

# Step 5: 生成关联规则
rules = association_rules(frequent_itemsets, metric="confidence", min_threshold=0.7)

# Step 6: 筛选有价值的规则（提升度>1）
valid_rules = rules[rules["lift"] > 1].sort_values("lift", ascending=False)
print(valid_rules[["antecedents", "consequents", "support", "confidence", "lift"]].head(10))</code></pre>

<h3>📖 四、参数调优指南</h3>
<ul>

<li><strong>支持度过低</strong>（如0.01）→ 项集太多无价值 → <strong>提高</strong>支持度</li>
<li><strong>置信度过低</strong> → 规则不可靠 → <strong>提高</strong>置信度阈值</li>
</ul>

<h3>📖 一、聚类是什么？</h3>
<p>聚类是<strong>无监督学习</strong>：不需要预先告诉模型"谁是哪一类"，算法自动将相似的数据点分到同一组。</p>

<h3>📖 二、KMeans算法原理</h3>
<ol>
<li><strong>随机初始化</strong>：选择 k 个中心点</li>
<li><strong>分配</strong>：每个数据点归到最近的中心点</li>
<li><strong>更新</strong>：重新计算每个簇的中心点（均值）</li>
<li><strong>重复</strong>步骤2-3，直到中心点不再变化</li>

<h3>📖 三、完整流程</h3>
<pre><code class="language-python">from sklearn.cluster import KMeans
from sklearn.preprocessing import StandardScaler
from sklearn.decomposition import PCA

plt.title("肘部法则")

<pre><code class="language-python">from sklearn.ensemble import RandomForestRegressor

from sklearn.preprocessing import StandardScaler
from sklearn.model_selection import train_test_split

# ====== 1. 数据准备 ======
df_user = pd.read_csv("user_behavior.csv")
df_goods = pd.read_csv("goods_data.csv")
df_sales = pd.read_csv("sales_data.csv")
df_order = pd.read_csv("order_data.csv")
df_cart = pd.read_csv("cart_data.csv")

# ====== 2. 核心分析 ======
# 2.1 描述统计
print("=== 数据概况 ===")

# 2.2 相关性分析
numeric_cols = df_sales.select_dtypes(include="number").columns
corr = df_sales[numeric_cols].corr()

# 2.3 KMeans用户聚类
features = df_user[["消费金额", "消费频次", "最近消费天数"]].dropna()
scaler = StandardScaler()
features_scaled = scaler.fit_transform(features)
kmeans = KMeans(n_clusters=4, random_state=42)
df_user.loc[features.index, "分群"] = kmeans.fit_predict(features_scaled)

# 2.4 随机森林销量预测
X = df_sales[["广告费", "活动次数", "客单价", "竞品价格"]]
y = df_sales["销量"]
X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.3, random_state=42)
rf = RandomForestRegressor(n_estimators=100, max_depth=5, random_state=42)
rf.fit(X_train, y_train)
print(f"\\n销量预测 R²: {rf.score(X_test, y_test):.4f}")

let pyodide = null;

let completedItems = JSON.parse(localStorage.getItem("completedItems") || "{}");
let codeEditors = {};
let isDarkTheme = localStorage.getItem("theme") !== "light";

// ============================================================
// Theme
// ============================================================
function applyTheme() {
    const body = document.body;
    if (isDarkTheme) {
        body.classList.add("dark-theme");
        body.classList.remove("light-theme");
        document.getElementById("themeIcon").className = "fas fa-moon";
    } else {
        body.classList.remove("dark-theme");
        body.classList.add("light-theme");
        document.getElementById("themeIcon").className = "fas fa-sun";
    }
    // Update CodeMirror theme
    Object.values(codeEditors).forEach(ed => {
        if (ed) ed.setOption("theme", isDarkTheme ? "dracula" : "default");
    });
}

function toggleTheme() {
    isDarkTheme = !isDarkTheme;
    localStorage.setItem("theme", isDarkTheme ? "dark" : "light");
    applyTheme();
}

// ============================================================
// Sidebar
// ============================================================
function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    const main = document.getElementById("mainContent");
    if (window.innerWidth <= 768) {
        sidebar.classList.toggle("mobile-open");
    } else {
        sidebar.classList.toggle("collapsed");
        main.classList.toggle("expanded");
    }
}

function renderSidebar() {
    const nav = document.getElementById("sidebarNav");
    let html = "";

    NAV_STRUCTURE.forEach(section => {
        if (section.type === "welcome") {
            html += `<div class="nav-item ${currentPage === section.id ? 'active' : ''}" onclick="navigateTo('${section.id}')">
                <i class="fas ${section.icon}" style="font-size:0.85rem;color:var(--accent)"></i>
                <span class="nav-label">${section.title}</span>
            </div>`;
            return;
        }

        const isCollapsed = localStorage.getItem("collapsed-" + section.id) === "true";
        html += `<div class="nav-section ${isCollapsed ? 'collapsed' : ''}" data-section="${section.id}">
            <div class="nav-section-title" onclick="toggleSection('${section.id}')">
                <span><i class="fas ${section.icon}" style="margin-right:6px"></i>${section.title}</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="nav-items">`;

        section.children.forEach(child => {
            const checked = completedItems[child.id] ? "checked" : "";
            html += `<div class="nav-item ${currentPage === child.id ? 'active' : ''}" data-nav-id="${child.id}" onclick="navigateTo('${child.id}')">
                <span class="check-icon ${checked}" onclick="event.stopPropagation(); toggleComplete('${child.id}')">
                    ${completedItems[child.id] ? '<i class="fas fa-check"></i>' : ''}
                </span>
                <span class="nav-label">${child.title}</span>
            </div>`;
        });

        html += `</div></div>`;
    });

    nav.innerHTML = html;
}

function toggleSubSection(subId) {
    const el = document.querySelector(`[data-sub-section="${subId}"]`);
    if (el) {
        el.classList.toggle("collapsed");
        localStorage.setItem("collapsed-" + subId, el.classList.contains("collapsed"));
    }
}

function toggleSection(sectionId) {
    const el = document.querySelector(`[data-section="${sectionId}"]`);
    if (el) {
        el.classList.toggle("collapsed");
        localStorage.setItem("collapsed-" + sectionId, el.classList.contains("collapsed"));
    }
}

function toggleComplete(itemId) {
    completedItems[itemId] = !completedItems[itemId];
    localStorage.setItem("completedItems", JSON.stringify(completedItems));
    renderSidebar();
    updateProgress();
}

function updateProgress() {
    const total = 40;
    const done = Object.values(completedItems).filter(Boolean).length;
    const pct = Math.round(done / total * 100);
    document.getElementById("progressBar").style.width = pct + "%";
    document.getElementById("progressText").textContent = `${done} / ${total} 已完成`;
}

// ============================================================
// Search
// ============================================================
function handleSearch(query) {
    const q = query.toLowerCase().trim();
    const nav = document.getElementById("sidebarNav");

    if (!q) {
        nav.querySelectorAll(".nav-item, .nav-section").forEach(el => el.style.display = "");
        return;
    }

    nav.querySelectorAll(".nav-section").forEach(section => section.style.display = "none");
    nav.querySelectorAll(".nav-item").forEach(item => item.style.display = "none");

    nav.querySelectorAll(".nav-item:not([data-nav-id])").forEach(item => {
        const label = item.querySelector(".nav-label");
        item.style.display = (label && label.textContent.toLowerCase().includes(q)) ? "flex" : "none";
    });

    nav.querySelectorAll(".nav-section").forEach(section => {
        const sectionTitle = section.querySelector(".nav-section-title span");
        const sectionText = sectionTitle ? sectionTitle.textContent.toLowerCase() : "";
        const items = section.querySelectorAll(".nav-item[data-nav-id]");
        let hasMatch = sectionText.includes(q);

        items.forEach(item => {
            const label = item.querySelector(".nav-label");
            if (label && label.textContent.toLowerCase().includes(q)) {
                item.style.display = "flex";
                hasMatch = true;
            }
        });

        if (hasMatch) {
            section.style.display = "";
            section.classList.remove("collapsed");
        }
    });
}

function playgroundUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const filename = file.name;
    const ext = filename.split('.').pop().toLowerCase();
    const statusEl = document.getElementById("playground-file-status");
    const filesEl = document.getElementById("playground-uploaded-files");

    if (ext === 'csv') {
        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            if (pyodideReady) {
                const escaped = content.replace(/\\/g, "\\\\").replace(/`/g, "\\`").replace(/\$/g, "\\$");
                pyodide.runPython(`
content = """${escaped}"""
with open("${filename}", "w", encoding="utf-8") as f:
    f.write(content)
                `);
                statusEl.innerHTML = '<i class="fas fa-check-circle" style="color:var(--green);margin-right:4px"></i> ' + filename + ' 已上传';
                filesEl.innerHTML += '<span style="display:inline-block;background:var(--bg-tertiary);padding:4px 10px;border-radius:6px;margin:4px;font-size:0.85rem"><i class="fas fa-file-csv" style="color:var(--accent);margin-right:4px"></i>' + filename + '</span>';
            } else {
                alert("Python 环境尚未就绪，请稍后再试");
            }
        };
        reader.readAsText(file, "utf-8");
    } else if (ext === 'xlsx' || ext === 'xls') {
        const reader = new FileReader();
        reader.onload = function(e) {
            const uint8Array = new Uint8Array(e.target.result);
            if (pyodideReady) {
                pyodide.globals.set("_pg_bytes", uint8Array);
                pyodide.runPython(`
with open("${filename}", "wb") as f:
    f.write(_pg_bytes.tobytes())
del _pg_bytes
                `);
                statusEl.innerHTML = '<i class="fas fa-check-circle" style="color:var(--green);margin-right:4px"></i> ' + filename + ' 已上传';
                filesEl.innerHTML += '<span style="display:inline-block;background:var(--bg-tertiary);padding:4px 10px;border-radius:6px;margin:4px;font-size:0.85rem"><i class="fas fa-file-excel" style="color:var(--green);margin-right:4px"></i>' + filename + '</span>';
            } else {
                alert("Python 环境尚未就绪，请稍后再试");
            }
        };
        reader.readAsArrayBuffer(file);
    } else {
        alert("不支持的文件格式，请上传 CSV 或 XLSX 文件");
    }
    event.target.value = "";
}

function clearPlaygroundEditor() {
    const editor = window._playgroundEditor;
    if (editor) editor.setValue("");
}

async function runPlaygroundCode() {
    const editor = window._playgroundEditor;
    const outputEl = document.getElementById("playground-output");
    if (!editor || !outputEl) return;

    const code = editor.getValue();
    outputEl.innerHTML = '<span style="color:var(--text-muted)">正在执行...</span>';

    if (!pyodideReady) {
        outputEl.innerHTML = '<div class="output-error">Python 环境尚未就绪，请稍候再试。</div>';
        return;
    }

    try {
        let capturedOutput = "";
        pyodide.setStdout({ batched: (msg) => { capturedOutput += msg + "\n"; } });
        pyodide.setStderr({ batched: (msg) => { capturedOutput += "[STDERR] " + msg + "\n"; } });

        await pyodide.runPythonAsync(`
import base64, io, sys
import warnings
warnings.filterwarnings("ignore", category=UserWarning)
import matplotlib.pyplot as plt

try:
${code.split("\n").map(line => "    " + line).join("\n")}
except Exception as e:
    print("__ERROR__" + str(type(e).__name__) + ": " + str(e))

images = []
for fig_num in plt.get_fignums():
    fig = plt.figure(fig_num)
    buf = io.BytesIO()
    fig.savefig(buf, format='png', dpi=100, bbox_inches='tight', facecolor=fig.get_facecolor())
    buf.seek(0)
    img_b64 = base64.b64encode(buf.read()).decode('utf-8')
    images.append(img_b64)
plt.close('all')

for img in images:
    print("__IMG__" + img + "__IMG_END__")
`);

        pyodide.setStdout({ batched: () => {} });
        pyodide.setStderr({ batched: () => {} });

        let html = "";
        if (!capturedOutput || !capturedOutput.trim()) {
            html = '<span style="color:var(--text-muted)">（无输出）</span>';
        } else {
            const errorMatch = capturedOutput.match(/__ERROR__(.+)/);
            if (errorMatch) {
                html += '<div class="output-error">' + escapeHtml(errorMatch[1].trim()) + '</div>';
            }
            const imgMatches = capturedOutput.match(/__IMG__(.*?)__IMG_END__/g);
            if (imgMatches) {
                imgMatches.forEach(m => {
                    const b64 = m.replace("__IMG__", "").replace("__IMG_END__", "");
                    html += '<img class="output-image" src="data:image/png;base64,' + b64 + '" alt="图表">';
                });
            }
            let textPart = capturedOutput.replace(/__IMG__.*?__IMG_END__/g, "").replace(/__ERROR__.*/g, "").trim();
            if (textPart) {
                html += '<div class="output-text">' + escapeHtml(textPart) + '</div>';
            }
        }
        outputEl.innerHTML = html || '<span style="color:var(--text-muted)">（无输出）</span>';
    } catch (err) {
        pyodide.setStdout({ batched: () => {} });
        pyodide.setStderr({ batched: () => {} });
        outputEl.innerHTML = '<div class="output-error">执行错误: ' + escapeHtml(err.message) + '</div>';
    }
}

function switchTab(projId, tab, btn) {
    document.querySelectorAll(`[id^="tab-"]`).forEach(p => p.classList.remove("active"));
    document.getElementById(`tab-${tab}-${projId}`).classList.add("active");
    btn.parentElement.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    // Load teaching content when first switching to teaching tab
    if (tab === "teaching" && document.getElementById("teaching-content-" + projId).innerHTML === "") {
        const tutId = "tut-" + projId.split("-")[1];
        if (SECTION_CONTENT[tutId]) {
            const teachingArea = document.getElementById("teaching-content-" + projId);
            const sc = SECTION_CONTENT[tutId];
            teachingArea.innerHTML = '<div class="teaching-wrapper">' + sc.content + '</div>';
        }
    }

    // Initialize full code editor when switching to fullcode tab
    if (tab === "fullcode") {
        setTimeout(() => getFullCodeEditor(projId), 50);
    }
}

function switchTabByName(projId, tab) {
    const btn = document.querySelector(`#tab-${tab}-${projId}`).previousElementSibling?.querySelector(`[onclick*="${tab}"]`) 
        || document.querySelector(`[onclick*="switchTab('${projId}', '${tab}'"]`);
    if (btn) switchTab(projId, tab, btn);
}

function toggleGuidedStep(projId, stepIdx) {
    const content = document.getElementById(`guided-content-${projId}-${stepIdx}`);
    const icon = document.getElementById(`guided-icon-${projId}-${stepIdx}`);
    if (content.style.display === 'none') {
        content.style.display = 'block';
        icon.style.transform = 'rotate(180deg)';
        // Initialize CodeMirror if not already
        const textarea = document.getElementById(`guided-editor-${projId}-${stepIdx}`);
        if (textarea && !textarea.dataset.initialized) {
            textarea.dataset.initialized = 'true';
            const proj = PROJECTS[projId];
            const step = proj.guidedSteps[stepIdx];
            const editor = CodeMirror.fromTextArea(textarea, {
                mode: "python",
                theme: "material-darker",
                lineNumbers: true,
                indentUnit: 4,
                tabSize: 4,
                lineWrapping: true,
                matchBrackets: true,
                autoCloseBrackets: true,
                extraKeys: { "Ctrl-Enter": () => runGuidedStep(projId, stepIdx) }
            });
            editor.setValue(step.template || '');
            editor.setSize("100%", "auto");
            window[`guidedEditor_${projId}_${stepIdx}`] = editor;
        }
    } else {
        content.style.display = 'none';
        icon.style.transform = 'rotate(0deg)';
    }
}

function resetGuidedStep(projId, stepIdx) {
    const editor = window[`guidedEditor_${projId}_${stepIdx}`];
    const proj = PROJECTS[projId];
    if (editor && proj.guidedSteps[stepIdx]) {
        editor.setValue(proj.guidedSteps[stepIdx].template || '');
    }
}

async function runGuidedStep(projId, stepIdx) {
    const editor = window[`guidedEditor_${projId}_${stepIdx}`];
    const outputEl = document.getElementById(`guided-output-${projId}-${stepIdx}`);
    if (!editor || !outputEl) return;

    const code = editor.getValue();
    outputEl.innerHTML = '<span style="color:var(--text-muted)">正在执行...</span>';

    if (!pyodideReady) {
        outputEl.innerHTML = '<div class="output-error">Python 环境尚未就绪，请稍候再试。</div>';
        return;
    }

    try {
        if (!pyodide || !pyodide.runPythonAsync) {
            outputEl.innerHTML = '<div class="output-error">Python 环境异常，请刷新页面。</div>';
            return;
        }

        await ensurePackages(projId);

        let capturedOutput = "";
        pyodide.setStdout({ batched: (msg) => { capturedOutput += msg + "\n"; } });
        pyodide.setStderr({ batched: (msg) => { capturedOutput += "[STDERR] " + msg + "\n"; } });

        await pyodide.runPythonAsync(`
import base64, io, sys
import warnings
warnings.filterwarnings("ignore", category=UserWarning)
import matplotlib.pyplot as plt

try:
${code.split("\n").map(line => "    " + line).join("\n")}
except Exception as e:
    print("__ERROR__" + str(type(e).__name__) + ": " + str(e))

images = []
for fig_num in plt.get_fignums():
    fig = plt.figure(fig_num)
    buf = io.BytesIO()
    fig.savefig(buf, format='png', dpi=100, bbox_inches='tight', facecolor=fig.get_facecolor())
    buf.seek(0)
    img_b64 = base64.b64encode(buf.read()).decode('utf-8')
    images.append(img_b64)
plt.close('all')

for img in images:
    print("__IMG__" + img + "__IMG_END__")
`);

        pyodide.setStdout({ batched: () => {} });
        pyodide.setStderr({ batched: () => {} });

        let html = "";
        if (!capturedOutput || !capturedOutput.trim()) {
            html = '<span style="color:var(--text-muted)">（无输出）</span>';
        } else {
            const errorMatch = capturedOutput.match(/__ERROR__(.+)/);
            if (errorMatch) {
                html += `<div class="output-error">${escapeHtml(errorMatch[1].trim())}</div>`;
            }
            const imgMatches = capturedOutput.match(/__IMG__(.*?)__IMG_END__/g);
            if (imgMatches) {
                imgMatches.forEach(m => {
                    const b64 = m.replace("__IMG__", "").replace("__IMG_END__", "");
                    html += `<img class="output-image" src="data:image/png;base64,${b64}" alt="图表">`;
                });
            }
            let textPart = capturedOutput.replace(/__IMG__.*?__IMG_END__/g, "").replace(/__ERROR__.*/g, "").trim();
            if (textPart) {
                html += `<div class="output-text">${escapeHtml(textPart)}</div>`;
            }
        }
        outputEl.innerHTML = html || '<span style="color:var(--text-muted)">（无输出）</span>';
    } catch (err) {
        pyodide.setStdout({ batched: () => {} });
        pyodide.setStderr({ batched: () => {} });
        outputEl.innerHTML = `<div class="output-error">执行错误: ${escapeHtml(err.message)}</div>`;
    }
}

function getFullCodeEditor(projId) {
    if (!window[`fullCodeEditor_${projId}`]) {
        const textarea = document.getElementById(`fullcode-editor-${projId}`);
        if (!textarea) return null;
        const proj = PROJECTS[projId];
        // Build template from all guided steps
        let template = "";
        if (proj.guidedSteps) {
            proj.guidedSteps.forEach((step, i) => {
                template += `# ====== 步骤 ${i+1}: ${step.title} ======\n`;
                template += step.template + "\n\n";
            });
        } else if (proj.starterCode) {
            template = proj.starterCode;
        }
        const editor = CodeMirror.fromTextArea(textarea, {
            mode: "python", theme: "material-darker", lineNumbers: true,
            indentUnit: 4, tabSize: 4, lineWrapping: true,
            matchBrackets: true, autoCloseBrackets: true,
            extraKeys: { "Ctrl-Enter": () => runFullCode(projId) }
        });
        editor.setValue(template);
        editor.setSize("100%", 400);
        window[`fullCodeEditor_${projId}`] = editor;
    }
    return window[`fullCodeEditor_${projId}`];
}

function resetFullCode(projId) {
    const editor = getFullCodeEditor(projId);
    if (!editor) return;
    const proj = PROJECTS[projId];
    let template = "";
    if (proj.guidedSteps) {
        proj.guidedSteps.forEach((step, i) => {
            template += `# ====== 步骤 ${i+1}: ${step.title} ======\n`;
            template += step.template + "\n\n";
        });
    } else if (proj.starterCode) {
        template = proj.starterCode;
    }
    editor.setValue(template);
}

function loadAnswerToFullCode(projId) {
    const editor = getFullCodeEditor(projId);
    if (!editor) return;
    const proj = PROJECTS[projId];
    let answer = "";
    if (proj.guidedSteps) {
        proj.guidedSteps.forEach((step, i) => {
            answer += `# ====== 步骤 ${i+1}: ${step.title} ======\n`;
            answer += step.answer + "\n\n";
        });
    }
    if (answer) {
        editor.setValue(answer);
    } else {
        editor.setValue("// 该项目暂未配置参考答案");
    }
}

                imgMatches.forEach(m => {
                    const b64 = m.replace("__IMG__", "").replace("__IMG_END__", "");
                    html += `<img class="output-image" src="data:image/png;base64,${b64}" alt="图表">`;
                });
            }
            let textPart = capturedOutput.replace(/__IMG__.*?__IMG_END__/g, "").replace(/__ERROR__.*/g, "").trim();
            if (textPart) {
                html += `<div class="output-text">${escapeHtml(textPart)}</div>`;
            }
        }
        outputEl.innerHTML = html || '<span style="color:var(--text-muted)">（无输出）</span>';
    } catch (err) {
        pyodide.setStdout({ batched: () => {} });
        pyodide.setStderr({ batched: () => {} });
        outputEl.innerHTML = `<div class="output-error">执行错误: ${escapeHtml(err.message)}</div>`;
    }
}

async function initPyodide(showOverlay = false) {
    const loadingText = document.getElementById("loadingText");
    const loadingProgress = document.getElementById("loadingProgress");
    const loadingOverlay = document.getElementById("loadingOverlay");
    const statusEl = document.getElementById("pyodideStatus");

    try {
        // Only show overlay when triggered by user click, not background auto-load
        if (showOverlay) {
            loadingOverlay.classList.remove("hidden");
            loadingText.textContent = "正在加载 Python 环境...";
            loadingProgress.style.width = "10%";
        }
        statusEl.innerHTML = '<span class="status-dot loading"></span><span>正在加载...</span>';

        // Load Pyodide + core packages in parallel (packages param downloads during bootstrap!)
        pyodide = await loadPyodide({
            indexURL: "https://cdn.jsdelivr.net/pyodide/v0.24.1/full/",
            packages: ["numpy", "pandas", "matplotlib", "scipy", "scikit-learn"]
        });
        loadingProgress.style.width = "80%";
        loadingText.textContent = "正在准备数据...";

        // Setup matplotlib for inline display
        pyodide.runPython(`
import matplotlib
matplotlib.use('Agg')
import matplotlib.pyplot as plt
import io, base64, sys
from io import StringIO
        `);

        // Load CSV data into Pyodide filesystem
        const csvMap = {
            "user_behavior.csv": CSV_DATA_USER_BEHAVIOR,
            "cart_data.csv": CSV_DATA_CART_DATA,
            "goods_data.csv": CSV_DATA_GOODS_DATA,
            "sales_data.csv": CSV_DATA_SALES_DATA,
            "time_series_sales.csv": CSV_DATA_TIME_SERIES_SALES,
            "order_data.csv": CSV_DATA_ORDER_DATA,
            "user_rfm.csv": CSV_DATA_USER_RFM
        };

        for (const [filename, content] of Object.entries(csvMap)) {
            pyodide.runPython(`
content = """${content}"""
with open("${filename}", "w", encoding="utf-8") as f:
    f.write(content)
            `);
        }

        loadingProgress.style.width = "90%";
        loadingText.textContent = "正在预装扩展库...";

        // Pre-install mlxtend, statsmodels and openpyxl in background
        try {
            await pyodide.loadPackage("micropip");
            const installResult = await pyodide.runPythonAsync(`
import micropip
installed = []
for pkg in ["mlxtend", "statsmodels", "openpyxl"]:
    try:
        await micropip.install(pkg)
        installed.append(pkg)
    except Exception:
        pass
",".join(installed)
            `);
            if (installResult) {
                installResult.split(",").forEach(p => loadedPackages.add(p.trim()));
            }
        } catch (e) {
            console.warn("Pre-install failed, will retry on demand:", e);
        }

        loadingProgress.style.width = "100%";
        loadingText.textContent = "加载完成！";

        // Configure matplotlib Chinese font
        try {
            await pyodide.runPythonAsync(`
import matplotlib
import matplotlib.pyplot as plt
import urllib.request, io, os, zipfile

# Download Noto Sans SC font
font_url = "https://github.com/google/fonts/raw/main/ofl/notosanssc/NotoSansSC%5Bwght%5D.ttf"
font_dir = "/tmp/fonts"
os.makedirs(font_dir, exist_ok=True)
font_path = os.path.join(font_dir, "NotoSansSC.ttf")

if not os.path.exists(font_path):
    try:
        urllib.request.urlretrieve(font_url, font_path)
    except Exception:
        # Fallback: use DejaVu with warnings suppressed
        matplotlib.rcParams['axes.unicode_minus'] = False
        raise Exception("Font download failed")

from matplotlib import font_manager
font_manager.fontManager.addfont(font_path)
prop = font_manager.FontProperties(fname=font_path)
matplotlib.rcParams['font.family'] = prop.get_name()
matplotlib.rcParams['axes.unicode_minus'] = False
plt.rcParams['font.sans-serif'] = [prop.get_name()]
            `);
        } catch (e) {
            console.warn("Font setup failed, Chinese labels may not render:", e);
            try {
                await pyodide.runPythonAsync(`
import matplotlib
matplotlib.rcParams['axes.unicode_minus'] = False
                `);
            } catch(e2) {}
        }

        pyodideReady = true;
        loadedPackages.add("numpy"); loadedPackages.add("pandas");
        loadedPackages.add("matplotlib"); loadedPackages.add("scipy");
        loadedPackages.add("scikit-learn");

        // Update status
        statusEl.innerHTML = '<span class="status-dot ready"></span><span>Python 就绪</span>';

        // Hide loading overlay
        setTimeout(() => {
            document.getElementById("loadingOverlay").classList.add("hidden");
        }, 300);

    } catch (err) {
        console.error("Pyodide init error:", err);
        loadingText.textContent = "加载失败: " + (err.message || String(err));
        loadingProgress.style.width = "0%";
        statusEl.innerHTML = '<span class="status-dot"></span><span>加载失败</span>';

        // Add retry button
        var retryBtn = document.createElement("button");
        retryBtn.className = "btn btn-primary";
        retryBtn.style.cssText = "margin-top:16px;padding:10px 24px;font-size:1rem";
        retryBtn.innerHTML = '<i class="fas fa-rotate-right"></i> 重新加载';
        retryBtn.onclick = function() {
            pyodideReady = false;
            pyodide = null;
            initPyodide(true);
        };
        var overlay = document.getElementById("loadingOverlay");
        if (overlay) {
            var old = overlay.querySelector(".retry-btn");
            if (old) old.remove();
            retryBtn.classList.add("retry-btn");
            overlay.querySelector(".loading-content").appendChild(retryBtn);
        }
    }
}

// Load extra packages on demand (e.g., mlxtend for project 3)
async function ensurePackages(projId) {
    const needed = PROJECT_PACKAGES[projId] || [];
    const builtinPkgs = needed.filter(p => ["numpy","pandas","matplotlib","scipy","scikit-learn","statsmodels","micropip"].includes(p));
    const pypiPkgs = needed.filter(p => !builtinPkgs.includes(p));

    for (const pkg of builtinPkgs) {
        if (!loadedPackages.has(pkg)) {
            try {
                await pyodide.loadPackage(pkg);
                loadedPackages.add(pkg);
            } catch(e) {}
        }
    }

    if (pypiPkgs.length > 0) {
        try {
            await pyodide.loadPackage("micropip");
            for (const pkg of pypiPkgs) {
                if (!loadedPackages.has(pkg)) {
                    // Try micropip first, then loadPackage as fallback
                    try {
                        await pyodide.runPythonAsync(`import micropip; await micropip.install("${pkg}")`);
                        loadedPackages.add(pkg);
                    } catch(e1) {
                        try {
                            await pyodide.loadPackage(pkg);
                            loadedPackages.add(pkg);
                        } catch(e2) {}
                    }
                }
            }
        } catch(e) {}
    }
}

async function runProjectCode(projId) {
    const outputEl = document.getElementById(`output-${projId}`);

    if (!pyodideReady) {
        outputEl.innerHTML = '<span style="color:var(--yellow)"><i class="fas fa-spinner fa-spin"></i> 首次运行需要加载 Python 环境，请稍候...</span>';
        const btn = document.getElementById(`runBtn-${projId}`);
        if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 加载中...'; }

        if (!pyodideLoading) {
            pyodideLoading = true;
            await initPyodide(true);
            pyodideLoading = false;
        }

        if (!pyodideReady) {
            outputEl.innerHTML = '<div class="output-error">Python 环境加载失败，请刷新页面重试。</div>';
            if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-play"></i> 运行'; }
            return;
        }

        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-play"></i> 运行'; }
    }

    // Load project-specific packages on demand
    await ensurePackages(projId);

    const editor = codeEditors[projId];
    if (!editor) return;

    const code = editor.getValue();
    outputEl.innerHTML = '<span style="color:var(--text-muted)">正在执行...</span>';

    try {
        if (!pyodide || !pyodide.runPythonAsync) {
            outputEl.innerHTML = '<div class="output-error">Python 环境尚未就绪，请稍候再试。</div>';
            return;
        }

        let result;
        let capturedOutput = "";
        try {
            // Capture stdout via callback
            pyodide.setStdout({ batched: (msg) => { capturedOutput += msg + "\n"; } });
            pyodide.setStderr({ batched: (msg) => { capturedOutput += "[STDERR] " + msg + "\n"; } });

            result = await pyodide.runPythonAsync(`
import base64, io, sys
import warnings
warnings.filterwarnings("ignore", category=UserWarning)
import matplotlib.pyplot as plt

try:
${code.split("\n").map(line => "    " + line).join("\n")}
except Exception as e:
    print("__ERROR__" + str(type(e).__name__) + ": " + str(e))

# Capture matplotlib figures
images = []
for fig_num in plt.get_fignums():
    fig = plt.figure(fig_num)
    buf = io.BytesIO()
    fig.savefig(buf, format='png', dpi=100, bbox_inches='tight', facecolor=fig.get_facecolor())
    buf.seek(0)
    img_b64 = base64.b64encode(buf.read()).decode('utf-8')
    images.append(img_b64)
plt.close('all')

for img in images:
    print("__IMG__" + img + "__IMG_END__")
`);
        } catch (execErr) {
            pyodide.setStdout({ batched: () => {} });
            pyodide.setStderr({ batched: () => {} });
            outputEl.innerHTML = `<div class="output-error">执行错误: ${escapeHtml(execErr.message)}</div>`;
            return;
        }

        // Reset stdout
        pyodide.setStdout({ batched: () => {} });
        pyodide.setStderr({ batched: () => {} });

        // Parse captured output
        let html = "";
        if (!capturedOutput || !capturedOutput.trim()) {
            html = '<span style="color:var(--text-muted)">（无输出）</span>';
        } else {
            // Check for errors
            const errorMatch = capturedOutput.match(/__ERROR__(.+)/);
            if (errorMatch) {
                html += `<div class="output-error">${escapeHtml(errorMatch[1].trim())}</div>`;
            }

            // Extract images
            const imgMatches = capturedOutput.match(/__IMG__(.*?)__IMG_END__/g);
            if (imgMatches) {
                imgMatches.forEach(m => {
                    const b64 = m.replace("__IMG__", "").replace("__IMG_END__", "");
                    html += `<img class="output-image" src="data:image/png;base64,${b64}" alt="图表">`;
                });
            }

            // Extract text (remove image markers and error lines)
            let textPart = capturedOutput
                .replace(/__IMG__.*?__IMG_END__/g, "")
                .replace(/__ERROR__.*/g, "")
                .trim();
            if (textPart) {
                html += `<div class="output-text">${escapeHtml(textPart)}</div>`;
            }
        }

        outputEl.innerHTML = html || '<span style="color:var(--text-muted)">（无输出）</span>';

    } catch (err) {
        outputEl.innerHTML = `<div class="output-error">执行错误: ${escapeHtml(err.message)}</div>`;
    }
}

function showDataPreview(csvName) {
    const csvKey = csvName;
    const content = csv_js_contents[csvKey] || "";
    const lines = content.split("\n").filter(l => l.trim());

    if (lines.length === 0) return;

    const headers = lines[0].split(",");
    const rows = lines.slice(1, 11); // First 10 rows

    let tableHtml = `<table class="data-table"><thead><tr>`;
    tableHtml += `<th>#</th>`;
    headers.forEach(h => {
        tableHtml += `<th>${escapeHtml(h.trim())}</th>`;
    });
    tableHtml += `</tr></thead><tbody>`;

    rows.forEach((row, i) => {
        const cols = parseCSVRow(row);
        tableHtml += `<tr><td>${i+1}</td>`;
        cols.forEach(c => {
            tableHtml += `<td>${escapeHtml(c.trim())}</td>`;
        });
        tableHtml += `</tr>`;
    });

    tableHtml += `</tbody></table>`;
    tableHtml += `<p style="margin-top:10px;font-size:0.8rem;color:var(--text-muted);">显示前10行，共 ${csv_rows_count[csvKey] || "?"} 行数据</p>`;

    document.getElementById("modalTitle").textContent = `${csvName}.csv 数据预览`;
    document.getElementById("modalBody").innerHTML = tableHtml;
    document.getElementById("dataModal").classList.add("active");
}

function parseCSVRow(row) {
    const result = [];
    let current = "";
    let inQuotes = false;
    for (let i = 0; i < row.length; i++) {
        const ch = row[i];
        if (ch === '"') {
            inQuotes = !inQuotes;
        } else if (ch === "," && !inQuotes) {
            result.push(current);
            current = "";
        } else {
            current += ch;
        }
    }
    result.push(current);
    return result;
}

function closeModal() {
    document.getElementById("dataModal").classList.remove("active");
}

// ============================================================
// File Upload
// ============================================================
function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const filename = file.name;
    const ext = filename.split('.').pop().toLowerCase();

    if (ext === 'csv') {
        // CSV: read as text
        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            if (pyodideReady) {
                const escaped = content.replace(/\\/g, "\\\\").replace(/`/g, "\\`").replace(/\$/g, "\\$");
                pyodide.runPython(`
import io
content = """${escaped}"""
with open("${filename}", "w", encoding="utf-8") as f:
    f.write(content)
                `);
                alert(`文件 ${filename} 已上传，可用 pd.read_csv("${filename}") 读取`);
            } else {
                alert("Python 环境尚未就绪，请稍后再试");
            }
        };
        reader.readAsText(file, "utf-8");
    } else if (ext === 'xlsx' || ext === 'xls') {
        // Excel: read as ArrayBuffer (binary)
        const reader = new FileReader();
        reader.onload = function(e) {
            const arrayBuffer = e.target.result;
            const uint8Array = new Uint8Array(arrayBuffer);
            if (pyodideReady) {
                // Convert to Python bytes and write
                pyodide.globals.set("_upload_bytes", uint8Array);
                pyodide.runPython(`
import io
with open("${filename}", "wb") as f:
    f.write(_upload_bytes.tobytes())
del _upload_bytes
                `);
                alert(`文件 ${filename} 已上传，可用 pd.read_excel("${filename}") 读取`);
            } else {
                alert("Python 环境尚未就绪，请稍后再试");
            }
        };
        reader.readAsArrayBuffer(file);
    } else {
        alert("不支持的文件格式，请上传 CSV 或 XLSX 文件");
    }

    event.target.value = "";
}
